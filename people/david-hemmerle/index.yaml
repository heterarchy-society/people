name: David Hemmerle
avatar: avatar.jpg
caption: Economic philosopher and researcher
description: >
  Studied Business Economics with a focus on heterodox financial theory as
  well as sustainable alternatives in accounting. Later on, he switched to
  Economics and Philosophy and focused on plural economic theory as well as
  the history of economic and political thought. His Ph.D. will focus on the
  relationship between economic thought and the development of modern
  technology, i. e. blockchain. (hcpp17)
