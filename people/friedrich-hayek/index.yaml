caption: "Economist and Nobel laureate"
description: >
  Austrian-British economist and philosopher, leading figure of the Austrian
  School. Nobel laureate in economics (1974). Author of The Road to Serfdom
  and "The Use of Knowledge in Society" (1945), which argued that dispersed
  local knowledge cannot be centralized and that prices coordinate economic
  activity without a planner possessing complete information.
