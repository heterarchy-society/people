name: Nick Szabo
born: "1964-04-05"
avatar: avatar.jpg
caption: "Computer scientist, legal scholar, and smart-contract pioneer"
description: >
  American computer scientist, legal scholar, and cryptographer. Coined "smart
  contracts" (1994) and proposed bit gold (1998), a direct precursor to Bitcoin.
  Author of "Trusted Third Parties Are Security Holes" and other essays on
  minimizing institutional trust through cryptographic protocol design.
