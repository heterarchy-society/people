name: David Chaum
avatar: avatar.webp
caption: "Cryptographer and inventor of digital cash"
description: >
  American computer scientist and cryptographer. Proposed blind signatures,
  mix networks, and the dining cryptographers protocol; founded DigiCash (1990).
  His 1985 CACM paper on security without identification outlined personal
  card computers and unlinkable digital pseudonyms — foundational ideas for
  privacy-preserving payment and credential systems.
