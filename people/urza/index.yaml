caption: Anarchocapitalist author, member of Svoboda učení, head of Ludwig von Mises Institute CZ/SK, author of Urza.cz.
refs:
  web: https://urza.cz
  twitter: urzanarchy
description: >
  Urza is an anarchocapitalist author who wrote almost one thousand libertarian
  texts. He is a head of Ludwig von Mises Institute CZ & SK, member of Svoboda
  učení (Freedom to Learn), author of Urza.cz and associate of Paralelní Polis.
  Urza is mainly focusing on moral aspects of stateless society, free-market
  based education system and government propaganda at public schools. He is
  about to publish the first Czech book about anarchocapitalism.
