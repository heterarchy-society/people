name: JW Weatherman
avatar: avatar.jpg
caption: Security expert, author of the Bitcoin Threat Model
description: >
  JW Weatherman is a software security expert that has been working with
  Fortune 500 companies for over 20 years. He's the author of the Bitcoin
  Threat Model, found at http://btcThreats.com . A successful entrepreneur in
  the software start-up space, JW is currently the lead contributor of the
  open-source project http://mathbot.com. Mathbot teaches kids math and
  programming by giving a robot a series of graphical commands. It's an
  intuitive and fun way for kids to learn. Mathbot is free to play, but allows
  parents to reward kids in Bitcoin for mastering a topic. If we succeed, the
  public schools will stop pretending to teach math. You can reach JW on
  Twitter at @weathermanIam, or on his YouTube channel and Podcast, where he
  talks math, Bitcoin, government, software security and hosts interviews with
  old-school cypherpunk legends, like Timothy C. May and new cypherpunks like
  Cody Wilson. (hcpp18)
