name: Eric Lombrozo
avatar: avatar.webp
caption: Cofounder and CEO of Ciphrex, Bitcoin developer
description: >
  Eric Lombrozo is a software developer and entrepreneur with seven years of
  blockchain development experience and over 20 years of experience in
  enterprise-scale software architecture, information security, systems
  integration, and project management. He is cofounder and CEO of Ciphrex
  Corp, a company developing tools and applications for cryptocurrency
  networks. In addition, Lombrozo has contributed to the Bitcoin Core open
  source project as well as software for other networks such as Litecoin,
  Ethereum, and Ripple. (hcpp18)
