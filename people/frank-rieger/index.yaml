name: Frank Rieger
avatar: avatar.jpg
caption: Hacker, entrepreneur, consultant and author
description: >
  Frank Rieger, is an hacker, entrepreneur, consultant and author.
  Professionally he has co-founded successful startups in the fields of of
  mobile navigation, maps, information security and practical cryptography. He
  works as CTO of a leading supplier of encrypted communication devices and
  mobile network security systems. He serves as a spokesperson for the german
  Chaos Computer Club. His texts on the impact of technology on the society,
  digital freedom rights and privacy as well as the future of work and
  cyberwar are regularly published in german and international media. Together
  with Constanze Kurz he has published three german bestseller books on the
  future of privacy ("Die Datenfresser", S. Fischer 2011), the future of work
  in a world of machines and artificial intelligence ("Arbeitsfrei", Random
  House 2013) and "Cyberwar" (C. Bertelsmann, 2018).
