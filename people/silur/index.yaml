name: Silur
avatar: avatar.jpg
caption: Cryptographer, Hacker, Monero Research Lab
description: >
  Originally a hacker, pentester and criminal advisor with (self-claimed)
  relatively good knowledge in cryptography design, the blockchain industry
  literally grew around me from being a shady question around web projects to
  one of the most thrilling subjects both in startup and government levels.
  Since then I'm mostly researching ways to keep this new kind of P2P economy
  private and anonymous, with a focus on quantum-safety. I was a former member
  of Ethereum Foundation, currently a contributor to Monero research lab,
  Libertaria, and founder of Rhyno tech where I help companies to adopt
  advanced use-cases like zeroknowledge protocols, ANDOS, outsourced computing
  and homomorphic encryption. (hcpp18)
