name: Kilian Rausch
avatar: avatar.jpg
caption: Product Anarchist
description: >
  Kilian plays product at Exchange Union, the project bootstrapping OpenDEX, a
  protocol for unstoppable P2P trading. OpenDEX is built on the Lightning &
  Raiden Network and brings individuals and exchanges onto the same network to
  trade instantly and trustlessly. Previously, he was the PO of Mobi at BTCC,
  the world’s first true global & mobile wallet for everyday people. (hcpp19)
