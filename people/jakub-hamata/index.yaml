name: Jakub Hamata
avatar: avatar.jpg
caption: Co-founder of Parallel Garden
description: >
  Jakub co-founded Parallel Garden and manages activities within the main area
  of project specialization - agricultural technologies. As a graduated
  landscape manager and designer he spent several years operating resorts in
  remote tropical areas. Jakub is co-author of first hydroponic systems
  located in cafeteria in Paralelni Polis. Currently, he develops hydroponic
  systems controlled by IoT devices.
