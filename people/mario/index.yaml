description: >
  Mário is a hacker and researcher working with EF on making the crypto
  ecosystem more efficient and anonymous. As a member of Paralelní Polis,
  co-founder of Bordel Hackerspace, and the driving force behind Pizza Day
  Prague, Mário educates about tools of cryptoanarchy in local communities with
  a focus on onboarding via Lightning and p2p exchange. He is a vast enjoyer of
  FOSS, parallel economy, and trolling bitcoiners.
