description: >
  Swiss engineer and entrepreneur working at the intersection of privacy, security, cryptography, and
  distributed systems. Author of [The Ethereum Cypherpunk Manifesto](writings:ethereum-cypherpunk-manifesto)
  (2024), published on-chain and as an EIP-4844 blob. Known for open-source tooling around Ethereum smart
  contract security — including snekmate (Vyper building blocks), CreateX, xdeployer, and the
  reentrancy-attacks archive — and for contributions to the Vyper ecosystem. Prefers to be quoted as
  "pcaversaccio" (no capitalisation).
