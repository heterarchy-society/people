name: Matej Held
avatar: avatar.jpg
caption: "White market agorist, educator and gamer, CEO of Hemisféra"
description: >
  Matej studied marketing and economics. He is currently focusing on
  innovation in education and entrepreneurial activism. He is the founder of
  Hemisféra and a member of the Progressbar hackerspace in Bratislava. He is
  interested in complex systems theory, philosophy and vipassana meditation in
  his free time. (hcpp17)
