description: >
  Nick works, teaches and communicates on a wide variety of geographical
  issues for a broad range of audiences, from policy-makers to five-year-old
  children. He also teaches at Oxford University where he is a Fellow of St
  Anne’s College. His most recent book, An Atlas of Countries that Don’t
  Exist, has been translated into six languages. Read more at
  www.nickmiddleton.net. (hcpp19)
