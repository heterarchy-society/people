description: >
  Bob Summerwill is the Executive Director of the ETC Cooperative. He has been
  a community member of the Ethereum project since 2015 and of the Hyperledger
  project since 2016. Bob has been programming since 1984 and a professional
  software engineer since 1996. He started his blockchain journey in 2014 and
  he has been building bridges to enterprise and towards mainstream adoption
  since 2016.
