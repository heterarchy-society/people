name: "Tomáš Michálek"
avatar: avatar.png
caption: "Co-founder of Prague's MakersLab – a 3D printing makerspace"
description: >
  Tomas Michalek is the co-founder of Prague's MakersLab – a 3D printing
  makerspace founded in Paralelni Polis. He is a 3D printing enthusiast, sees
  a huge potential of 3D printing across all industries and feels that it is
  one of the tools that is going to change the world. Tomas is the 3D printing
  community leader educating public in the use of this technology. Company
  teams and individuals are coming to MakersLab to learn what it takes to
  print their own product and how it can help them. He is also building a 3D
  factory. He is fascinated by new technologies and their applications that
  can help people solve their problems and needs. (hcpp17)
