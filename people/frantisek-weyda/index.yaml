name: Frantisek Weyda
avatar: avatar.webp
caption: "Entomolog, fotograf mikrokosmu, umělec a popularizátor vědy"
description: >
  František Weyda je nezaměnitelnou osobností popularizace vědy a digitálního
  zobrazování v biologii. Je absolventem Přírodovědecké fakulty UK v Praze,
  oboru entomologie. Jeho hlavním vědeckým zájmem je studium ultrastruktury
  hmyzu. Ve vědeckém prostředí je znám po celém světě díky jeho nezaměnitelným
  digitálně upravovaným fotografiím ze ele.mikroskopu. Pracoval také v různých
  laboratořích v Evropě a USA. V roce 1998 založil Laboratoř digitálního
  zobrazování v entomologii, ve které rozpracoval koncepci vědecké digitální
  fotografie. (hcpp15)
