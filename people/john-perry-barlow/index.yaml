name: John Perry Barlow
avatar: avatar.jpg
caption: "Poet, EFF co-founder, and cyberspace rights advocate"
description: >
  American poet, essayist, and Grateful Dead lyricist. Co-founder of the
  Electronic Frontier Foundation and author of A Declaration of the
  Independence of Cyberspace (1996), a landmark manifesto for digital
  freedom and self-governance online.
