description: >
  Ryan discovered the cypherpunks mailing list as a young teenager in the
  early 1990s, telephoned NSA to order the NCSC Rainbow Series of books, and
  became a true believer in cryptoanarchy and the power of cryptography to
  stand up to nation-states and other oppressors. He’s worked on projects and
  companies involving Chaumian digital cash systems, offshore data havens in
  the North Sea, seasteading, uncensorable hosting technologies, remote
  attestation-based tamperproof cloud computing, and now cryptocurrency
  insurance infrastructure. He is currently the Chief Security Officer of
  Evertas Insurance and lives in San Juan, Puerto Rico.
