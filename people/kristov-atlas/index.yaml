name: Kristov Atlas
avatar: avatar.jpg
caption: Security Consultant, Privacy Researcher, Crypto-currency Auditor and Bitcoin Speaker
description: >
  Během přednášky se navrátíme k letitému konceptu peněz a stanovení
  zastupitelnosti: jak důležitá zastupitelnost je? Na tomto základě budeme
  zkoumat, zda je Bitcoin na cestě ke kolapsu zastupitelnosti a jaká ochranná
  opatření je možné podniknout. Kristov pracoval na vyhodnocování síťové a
  aplikační bezpečnosti jak pro začínající start-upy vyvíjející bitcoinové
  peněženky, tak i pro největší světové korporace. Kristov odhalil kritické
  zranitelnosti ve světově nejoblíbenější bitcoinové službě - nástroji
  SharedCoin od Blockchain.info. Patří k mimořádně oblíbeným speakerům a
  významným postavám newyorské bitcoinové scény. (hcpp15)
