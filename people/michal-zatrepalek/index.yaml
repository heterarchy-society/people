name: "Michal Zatřepálek"
avatar: avatar.jpg
caption: Co-founder of Parallel Garden
description: >
  Michal is co-founder of Parallel Garden and entrepreneur with special focus
  on strategic management. In 2014, he started his first cryptocurrency
  minning project and got involved in Paralelni Polis shortly after its
  foundation. Inspiration by fundamental ideas of Bitcoin and practical
  minning experience lead him to start solving residual heat produced by
  miners in project "Kotel" ("The Boiler" in Czech). Especially thanks to his
  experience he understood substantial significance in linking ("bridging")
  cooperation between the disciplines and further develops this activity.
