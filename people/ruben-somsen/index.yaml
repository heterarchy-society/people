name: Ruben Somsen
avatar: avatar.webp
refs:
  twitter: SomsenRuben
description: >
  Ruben is working on a protocol design for enhancing Bitcoin. He is the
  author of protocol proposals like Softchains, Statechains, Spacechains,
  Succinct Atomic Swaps, and Trustless P2P Lending. As a long-term member of
  the Bitcoin community, he started Seoul Bitcoin Meetups, helps to maintain
  the bitcoin-dev mailing list, and co-hosts the Unhashed Podcast.
