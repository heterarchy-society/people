name: "Pavol Trávnik"
avatar: avatar.jpg
caption: "IT developer, lawyer & entrepreneur"
description: >
  Pavol Travnik studied law both in Slovakia and Czechia. After graduation,
  Pavol has changed his professional interest into IT development in insurance
  and pharmacy companies. He described the definition of cryptocurrencies in
  Czech and Slovak civil law. His constant fascination by legal imperfection
  and anonymous cryptocurrencies lead him to explore and collect more examples
  of how to liberate himself and others by hacking the law. (hcpp18)
