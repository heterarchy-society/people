name: Michalis Kargakis
avatar: avatar.webp
description: >
  Michalis has some years of experience in the software industry, mainly as a
  sofware engineer but also as a public speaker in various tech conferences.
  He started his journey back in 2014 when he got briefly involved in Bitcoin
  development, then joined Red Hat for 4 years, working on infrastructure
  automation, only to jump back to the blockchain industry in the last year
  for good. He enjoys being part of the cryptocurrency community, and also
  attends a Masters degree in Digital Currency at the University of Nicosia.
