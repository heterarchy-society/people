name: "Petr Lupač"
avatar: avatar.webp
caption: Assistant Professor at the Department of Sociology, Faculty of Arts, Charles Univerzity (CZ)
description: >
  Petr Lupač obtained a Doctoral Degree in Sociology from the Faculty of Arts
  at Charles University, Czech Republic where he now serves as Assistant
  Professor. He has participated in academic and research programmes in Kansas
  State University and New York University. His primary sociological interests
  include technology, globalization and media. Since 2015, he has also been
  working as an external consultant for the Czech Strategy for Digital
  Literacy. He is the Czech representative for the World Internet Project.
  Recently, he published the book Beyond the Digital Divide: Contextualizing
  the Information Society. (hcpp19)
