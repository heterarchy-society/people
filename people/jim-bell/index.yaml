name: Jim Bell
avatar: avatar.jpeg
description: >
  James Dalton Bell, 59 years ago. Before age 9, I'd lived in Ohio, New York
  state, Ohio, Michigan. Moved to Kansas age 9. High School: Shawnee Mission
  North High School Hobbies: Primarily Chemistry and Electronics. Higher
  education: Bachelor of Science in Chemistry, Massachusetts Institute of
  Technology, Cambridge Massachusetts, USA. Worked for Intel Corporation,
  1980-1982 as a semiconductor text engineer. Started my own company,
  "SemiDisk Systems Inc", in Aloha Oregon 1982, operated until July 1992.
  Electronics consultant 1992 onwards. Wrote Assassination Politics Essay from
  February 1995-about April 1996. (hcpp17)
