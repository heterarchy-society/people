description: >
  As part of the forming Bitcoin community, Amir became an early Bitcoin
  developer, author of the BIP process, and the Libbitcoin implementation. With
  contributions to many free and open-source projects, he collaborated with Cody
  Wilson on launching Darkwallet and laid the foundations for OpenBazaar. Later,
  he spent nearly 2 years in the Rojava revolution, first for nearly 4 months
  fighting in the YPG and then working for the administration on economic
  projects. Today, Amir is focused on the DarkFi project, a network bringing
  anonymity to decentralized finance, and is still working towards building an
  agonistic revolutionary hacker movement.
