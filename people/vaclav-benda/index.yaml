name: Václav Benda
avatar: avatar.jpg
altNames:
  - Vaclav Benda
caption: "Czech dissident and author of Paralelní polis"
description: >
  Czech dissident, Charter 77 signatory, and political theorist. Author of
  the 1978 samizdat essay Paralelní polis, which argued that dissidents
  should build parallel institutions — schools, courts, media — to make the
  totalitarian state irrelevant rather than confront it directly.
