description: >
  Bitcoinová legenda, tvůrce a zakladatel prvního miningového poolu na těžbu
  bitcoinu (Slush Pool) a spolutvůrce hardwarové peněženky TREZOR,
  nejbezpečnější hardwarové peněženky na kryptoměny. Marek provozuje portál
  Bitcoin.cz, jehož cílem je podporovat povědomí o digitální měně Bitcoin v
  České republice a na Slovensku. (hcpp15)
