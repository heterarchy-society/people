description: >
  Radim is attorney-at-law and proud implementer of Paralelni Polis ideas. As
  a co-founder of Parallel Garden, he is primarily in charge of legal agenda -
  however, not only in a way you would assume. Project based on ideas of
  Paralelni Polis demands effort to keep the compliance with its ideas. It
  covers either searching for specific rules, or even creating the new ones.
  In 2017, Radim also co-founded Blockchain Legal, law firm focused on
  cryptocurrencies and digital technologies based in Prague. (hcpp19)
