name: "Josef Šíma"
avatar: avatar.jpg
caption: President of CEVRO Institute and Director of its international PPE MA program
description: >
  Josef Šíma is the president of CEVRO Institute [school of legal and social
  studies] and a Director of its unique international Philosophy, Politics,
  Economics (PPE) MA program. He translated over 10 books including Ludwig von
  Mises’s Human Action or Murray Rothbard’s Man, Economy and State, and Power
  and Market. (hcpp17)
