name: Travin Keith
avatar: avatar.jpeg
caption: Cryptocurrency, Freedom, and Open Source Advocate and Former Digital Nomad
description: >
  Travin Keith, CTO of Consortio Group, is a former digital nomad who has
  lived in 8 countries across 4 continents. Since shifting from a primarily
  digital marketing background in 2016, he has worked in the cryptocurrency
  space, as a volunteer, such as with the Bitcoin Markets community, a Board
  Member, with the Nxt Foundation, an advisor and consultant for a wide range
  of projects, as well as an entrepreneur with his ventures Agavon, Altrean
  (both now defunct), and Stokr, of which he is a current Advising Co-Founder,
  to name just a few. He has also contributed significantly to open source
  projects in and out of the cryptocurrency space, especially with
  Hyperledger, of which he co-authored the white paper. He has frequently
  spoken at events ranging from meetups to large conferences across the world,
  such as the Open Source Leadership Summit in 2018, hosted by the Linux
  Foundation, mainly around the areas of cryptocurrency and distributed ledger
  technology. During his time as a digital nomad, of which he in some ways
  still is, he has encountered numerous issues with regards to both relocating
  and basic travel, personally through his own experiences and 2nd hand
  through the experiences of many others he encountered. At HCPP 19, he looks
  forward to discussing these as well as reporting on his research to
  highlight the dehumanizing issues regarding the current immigration systems
  around the world.
