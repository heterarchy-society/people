name: Sonja Prstec
avatar: avatar.webp
caption: Lawyer and CLO of Bitnation
description: >
  I have been working as a lawyer for 12 years. I have been the official legal
  advisor and representative for project Liberland for the last 3 years and
  for the project Bitnation for 1 year. I'm interested in credible
  alternatives to existing governmental and nation structures, crypto
  community, blockchain and AI technology implementations. I want to focus on
  legal consultancy, support for startups regarding technology and
  cryptocurrency projects. I'm personally interested in defending individual
  freedom and humanitarian rights in general. (hcpp18)
