name: Li Zhao Schoolland
avatar: avatar.webp
caption: Director of External Relations—Asia Pacific for the Acton Institute and the Founder of TFT Events
description: >
  Li Zhao Schoolland is an independent educator, writer, translator, and event
  organizer and a member of the Mont Pelerin Society. Mrs. Schoolland survived
  26 years through the horrors of Mao’s regime in China. This motivated her to
  a lifetime of promoting freedom and liberty globally through the
  organization of Austrian economics and entrepreneurship conferences and
  summer camps over two decades in Eastern Europe, Asia/Pacific, and North
  Africa. She arranges translation and publication of libertarian literature
  in China and coaches parents in raising liberty-minded youth. (hcpp19)
