name: Pablo Coirolo
avatar: avatar.jpg
caption: Entrepreneur, CEO of Light 47, Global Coordinating Node of Crypto Bay Montevideo
description: >
  Pablo has over 20 years of international experience leading innovative
  business projects, working with both startups and established
  multinationals. Among these, he was CEO Telefónica Data Uruguay where he
  launched the companies LMDS high speed internet data network. He later
  started Latin America’s first mobile payment platform Debifone, and designed
  and implemented a Big Data Business Intelligence Platform for Nestle, Peru.
  Since 2015 Pablo has been focusing on crypto currencies and block chain
  development in Germany, Zug Crypto Valley and Liechtenstein. In 2018 he
  founded Light47 a Blockchain and Crypto services company that draws on an
  extensive worldwide partner network to provide business with a full range of
  ICO advisory services. He is also spearheading the development of Crypto Bay
  Montevideo to create a community of service providers and businesses to help
  Uruguay join the club of Crypto-friendly jurisdictions Pablo has an MBA in
  International Finance and Management Information Systems from the American
  University, Washington D.C. (hcpp18)
