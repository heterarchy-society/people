description: >
  Tone is a former Bear Stearns Risk Analyst & JP Morgan Chase VP. His
  expertise is in Economic Trends, Trading and Risk Analysis. Ever since
  getting involved in the Crypto Currency ecosystem in early 2013, he has been
  very active in spreading the relevance and importance of this technology as
  it helps promote economic freedom as the War on Cash rages on. Tone was
  recently featured in a Bitcoin Documentary – Magic Money. Tone is now an
  independent content creator at LibertyLifeTrail and the host of three
  YouTube podcasts: CryptoScam, On The Record, and Tone's Market Analysis.
  Tone holds a Masters Degree in Financial Engineering along with Bachelor
  Degrees in Mathematics and Geology. (hcpp17)
