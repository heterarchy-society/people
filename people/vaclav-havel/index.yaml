name: Václav Havel
born: "1936-10-05"
died: "2011-12-18"
avatar: avatar.jpg
altNames:
  - Vaclav Havel
caption: "Czech dissident, playwright, and president"
description: >
  Czech playwright, essayist, and dissident. Co-founder of Charter 77 and
  author of The Power of the Powerless (1978), which analyzed post-totalitarian
  power through the parable of the greengrocer and the concept of living in
  truth. Last president of Czechoslovakia (1989–1992) and first president of
  the Czech Republic (1993–2003).
