description: >
  Jarrad came to Bitcoin in early 2011 through agorism, counter-economics and
  crypto-anarchy. Seeing that Bitcoin could operate a monetary policy in a
  hostile environment, he began to view public blockchains as a voluntary social
  order, one that did not depend on a monopoly of violence. From there he
  participated in early attempts to generalise the Bitcoin script to advance
  institutional libertarianism, ultimately becoming an early contributor to
  Ethereum. While Jarrad advances privacy technologies through developing an
  e2e and p2p private messaging client and super app, Status, he realised that
  privacy technologies are not enough and now is advocating for self-sovereign
  crypto-networks, the realisation of a latent cypherpunk dream, the crypto-state.
