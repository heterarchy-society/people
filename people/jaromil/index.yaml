description: >
  Jaromil is a purpose-driven software artisan and hacktivist. Author of the
  forkbomb virus, dubbed as the most elegant computer code ever written, he is
  an expert in the politics of technology and doctor in philosophy. Jaromil is
  the founder of Dyne.org and has a long history in developing and
  disseminating digital tools for freedom of speech and privacy. For more Info
  and publications see jaromil.dyne.org
