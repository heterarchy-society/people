name: Justin Smith
avatar: avatar.webp
caption: Cryptofinance technologist, CEO of XMR Systems
description: >
  Justin Smith is a cryptofinance technologist and programmer. He started
  working with Bitcoin almost 5 years ago when he created a Bitcoin payment
  system for his own e-commerce startup and spent the last two years working
  with Swiss banks. As the CEO of XMR Systems, he’s an advocate of solutions
  built on Bitcoin and Monero technologies. (hcpp17)
