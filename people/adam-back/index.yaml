description: >
  Dr. Adam Back is the inventor of hashcash (used in Bitcoin mining) and
  co-founder and CEO of Blockstream. Adam has worked on e-cash protocols since
  1995. He was an architect and cryptographer at Zero-Knowledge Systems, and a
  consultant to companies such as Nokia and VMware. Adam holds a Ph.D. in
  computer science from the University of Exeter. (hcpp17)
