name: Julian Assange
born: "1971-07-03"
avatar: avatar.jpg
caption: "Publisher, programmer, and WikiLeaks founder"
description: >
  Australian editor, programmer, and activist. Founded WikiLeaks (2006) and
  authored early essays including "Conspiracy as Governance" (2006), which
  modeled authoritarian power as conspiratorial networks and argued that leaks
  nonlinearly degrade unjust governance. Cypherpunk-adjacent figure in the
  movement for radical transparency and secure anonymous publishing.
