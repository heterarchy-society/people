name: Wei Dai
avatar: avatar.png
caption: "Cypherpunk and creator of b-money"
description: >
  Chinese-American computer engineer and cypherpunk. Proposed b-money (1998),
  an anonymous digital cash and contract system cited by Satoshi Nakamoto in
  the Bitcoin whitepaper. Also known for the Crypto++ library and co-design of
  the VMAC message authentication algorithm.
