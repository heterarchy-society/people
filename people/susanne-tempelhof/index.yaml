name: Susanne Tarkowski Tempelhof
avatar: avatar.webp
caption: BITNATION Founder and CEO
description: >
  Susanne je podnikatelka, investorka do technologií a spisovatelka. Patří k
  hlavním zakladatelům projektu Bitnation - první platfomy pro
  decentralizovanou organizaci společnosti na světě, jež funguje na operačním
  systému Governance 2.0 založeném na blockchainu. V roce 2008 založila
  společnost Wise Strategic Communication, první afghánskou společnost se
  zameřením na strategickou komunikaci. V návaznosti na Arabské jaro v roce
  2011 založila Shabakat Corporation v Egyptě a Libyi, aby podporovaly místní
  občanská hnutí. Po skončení občanské války v Libyi transformovala Shabakat
  na technologickou společnost poskytující poradenství v oblasti krypto
  investic a těžby kryptoměn v Indonésii. Je autorkou připravované knihy
  “Googlement - DIY průvodce pro spuštění vlastního národa (a změny světa)”.
  (hcpp15)
