name: Mitch Altman
avatar: avatar.webp
refs:
  twitter: maltman23
description: >
  Mitch is a Berlin-based hacker and inventor, best known for inventing
  TV-B-Gone, as a featured speaker at hacker conferences, as an international
  expert on the hackerspace movement, and for teaching introductory
  electronics workshops. He is the founder of San Francisco hackerspace
  Noisebridge and also the Chief Scientist and CEO of Cornfield Electronics.
