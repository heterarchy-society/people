name: Build and deploy people to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [atlas-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Update Atlas dependency
        if: github.event_name == 'repository_dispatch'
        run: bun update @heterarchy-society/atlas

      - name: Cache Atlas Images
        uses: actions/cache@v3
        with:
          path: .atlas-cache
          key: atlas-images-${{ github.repository }}-${{ github.sha }}
          restore-keys: |
            atlas-images-${{ github.repository }}-

      - run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify website rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.WEB_DISPATCH_TOKEN }}
        run: |
          gh api repos/heterarchy-society/heterarchy.fyi/dispatches \
            -f event_type=dataset-updated \
            -f client_payload[dataset]=people
